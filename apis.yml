aid: active-campaign
name: ActiveCampaign
description: >-
  ActiveCampaign is a customer experience automation platform that combines
  email marketing, marketing automation, CRM, sales engagement, and
  transactional messaging for small and mid-sized businesses. The
  ActiveCampaign API v3 is a REST/JSON API organized around resources such as
  contacts, deals, automations, campaigns, lists, and tags, with per-account
  base URLs of the form youraccountname.api-us1.com/api/3. Authentication is
  performed via an Api-Token HTTP header containing the account API key.
type: Index
