    name: ActiveCampaign API v3
    description: >-
      REST API for managing contacts, deals, automations, campaigns, lists,
      tags, custom fields, and ecommerce data in ActiveCampaign. Each account
      uses its own base URL ({account}.api-us1.com/api/3) and authenticates
      via an Api-Token header.
    humanURL: https://developers.activecampaign.com/reference/overview
